<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرجع الرسمي لمدد الباندات والعقوبات - سيرفر Nice City</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --primary-orange: #ff5500;
            --card-bg: #1a110b;
            --green-add: #00ff66;
            --red-delete: #ff3333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }

        .admin-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
            transition: 0.3s;
        }

        .admin-btn.active {
            background-color: var(--green-add);
            color: black;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: linear-gradient(135deg, #2b160a 0%, #170b04 100%);
            border: 2px solid var(--primary-orange);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.15);
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-orange);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            text-align: center;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            font-size: 16px;
            background-color: #141414;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 10px rgba(255, 85, 0, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #2a1a10;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card-title {
            color: var(--primary-orange);
            font-size: 22px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #3a2518;
            padding-bottom: 10px;
        }

        .section-title {
            color: #d1703c;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        .item-text {
            flex-grow: 1;
            background-color: #0f0a06;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #22150e;
        }

        /* تنسيقات خاصة بوضع التعديل للمدير فقط */
        body.edit-active [contenteditable="true"] {
            outline: 2px dashed var(--primary-orange) !important;
            background-color: rgba(255, 85, 0, 0.1) !important;
        }

        /* إخفاء أزرار التحكم افتراضياً عن المواطنين */
        .add-btn, .delete-btn, .delete-card-btn, .add-card-global-btn {
            display: none !important;
        }

        /* إظهار الأزرار فقط وفقط إذا كان body يحمل كلاس الإدارة النشطة */
        body.edit-active .add-btn,
        body.edit-active .delete-btn,
        body.edit-active .delete-card-btn,
        body.edit-active .add-card-global-btn {
            display: inline-block !important;
        }

        .add-btn {
            background-color: #132b1c;
            color: var(--green-add);
            border: 1px dashed var(--green-add);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            width: 100%;
        }

        .delete-btn {
            background-color: var(--red-delete);
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-card-btn {
            background-color: #5a1111;
            color: #ff9999;
            border: 1px dashed #ff3333;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
        }

        .add-card-global-btn {
            background-color: #112233;
            color: #3399ff;
            border: 2px dashed #3399ff;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin: 30px auto;
        }
    </style>
</head>
<body>

    <button class="admin-btn" id="adminToggleBtn" onclick="handleAdminMode()">دخول الإدارة 🔒</button>

    <div class="header-container">
        <img src="Nice1.jpg" alt="Nice City Logo" class="logo-img">
        <h1 id="mainTitle" contenteditable="false">المرجع الرسمي لمدد الباندات والعقوبات - سيرفر Nice City</h1>
        <p id="mainSubtitle" contenteditable="false">السلام عليكم ورحمة الله وبركاته - المرجع الشامل والمنظم للإدارة واللاعبين</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" onkeyup="searchLaws()" placeholder="🔍 اكتب اسم المخالفة لإظهار مدة الباند فوراً...">
    </div>

    <!-- زر إضافة قائمة جديدة (يظهر للمدير فقط) -->
    <div style="text-align: center;">
        <button class="add-card-global-btn" onclick="addNewCard()">+ إضافة قائمة قوانين جديدة</button>
    </div>

    <div class="grid-container" id="mainGridContainer">
        <!-- البيانات والكروت بيتم سحبها تلقائياً من الفايربيس هنا -->
    </div>

    <script>
        // تكوين الـ Firebase (تأكد أن البيانات تطابق مشروعك)
        const firebaseConfig = {
            databaseURL: "https://banned-team-1-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isEditMode = false;

        // تحميل البيانات عند فتح الصفحة تلقائياً
        window.onload = function() {
            database.ref('niceCityData').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.gridHtml) document.getElementById('mainGridContainer').innerHTML = data.gridHtml;
                    if (data.title) document.getElementById('mainTitle').innerText = data.title;
                    if (data.subtitle) document.getElementById('mainSubtitle').innerText = data.subtitle;
                }
                // إجبار التعديل على الحقول حسب وضع الإدارة الحالي
                setEditable(isEditMode);
            });
        };

        // دالة التحكم بوضع الإدارة وحفظ البيانات
        function handleAdminMode() {
            const btn = document.getElementById('adminToggleBtn');
            // كلمة السر المعقدة والجديدة لحماية السيرفر بالكامل
            const SECURE_PASSWORD = `aaxsssaolofll?>birpposa0*&6887xz7729087x7/)%%%@CXMJHLJj!~~--`;

            if (!isEditMode) {
                let passwordInput = prompt("الرجاء إدخل كلمة مرور الإدارة للتعديل:");

                if (passwordInput === SECURE_PASSWORD) {
                    isEditMode = true;
                    document.body.classList.add('edit-active');
                    btn.innerText = "💾 حفظ ونشر التعديل للجميع";
                    btn.classList.add('active');
                    setEditable(true);
                } else {
                    alert("❌ كلمة المرور خاطئة!");
                }
            } else {
                // رفع وحفظ التعديلات للـ Firebase بأمان
                database.ref('niceCityData').set({
                    gridHtml: document.getElementById('mainGridContainer').innerHTML,
                    title: document.getElementById('mainTitle').innerText,
                    subtitle: document.getElementById('mainSubtitle').innerText
                }).then(() => {
                    isEditMode = false;
                    document.body.classList.remove('edit-active');
                    btn.innerText = "🔒 دخول الإدارة";
                    btn.classList.remove('active');
                    setEditable(false);
                    alert("✅ تم حفظ ونشر التعديلات بنجاح!");
                }).catch((error) => {
                    alert("❌ خطأ في حفظ البيانات: " + error.message);
                });
            }
        }

        // تحويل الحقول لتكون قابلة للتعديل أو العكس
        function setEditable(editable) {
            document.getElementById('mainTitle').contentEditable = editable;
            document.getElementById('mainSubtitle').contentEditable = editable;
            
            const editableElements = document.querySelectorAll('#mainGridContainer [contenteditable]');
            editableElements.forEach(el => {
                el.contentEditable = editable;
            });
        }

        // إضافة كارد (قائمة) جديدة
        function addNewCard() {
            if (!isEditMode) return;
            const container = document.getElementById('mainGridContainer');
            const cardId = 'card_' + Date.now();
            
            const cardHtml = `
                <div class="card" id="${cardId}">
                    <h3 class="card-title" contenteditable="true">اسم المجموعة الجديدة</h3>
                    
                    <div class="section-title">المخالفات:</div>
                    <div class="items-wrapper violations-rules">
                        <div class="item-row">
                            <button class="delete-btn" onclick="deleteRow(this)">❌</button>
                            <div class="item-text" contenteditable="true">المخالفة الأولى</div>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addNewRow(this, 'violations-rules')">+ إضافة مخالفة</button>
                    
                    <div class="section-title">العقوبات:</div>
                    <div class="items-wrapper punishments-rules">
                        <div class="item-row">
                            <button class="delete-btn" onclick="deleteRow(this)">❌</button>
                            <div class="item-text" contenteditable="true">العقوبة الأولى</div>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addNewRow(this, 'punishments-rules')">+ إضافة عقوبة</button>
                    
                    <button class="delete-card-btn" onclick="deleteCard('${cardId}')">❌ حذف هذه القائمة بالكامل</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
            setEditable(true);
        }

        // إضافة سطر جديد داخل الكارد
        function addNewRow(btn, type) {
            if (!isEditMode) return;
            const card = btn.closest('.card');
            const wrapper = card.querySelector('.' + type);
            const rowHtml = `
                <div class="item-row">
                    <button class="delete-btn" onclick="deleteRow(this)">❌</button>
                    <div class="item-text" contenteditable="true">تعديل النص...</div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', rowHtml);
            setEditable(true);
        }

        // حذف سطر
        function deleteRow(btn) {
            if (!isEditMode) return;
            btn.closest('.item-row').remove();
        }

        // حذف كارد بالكامل
        function deleteCard(cardId) {
            if (!isEditMode) return;
            if (confirm("هل أنت متأكد من حذف هذه القائمة بالكامل؟")) {
                document.getElementById(cardId).remove();
            }
        }

        // نظام البحث الذكي للمواطنين واللاعبين
        function searchLaws() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                if (text.includes(input)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
